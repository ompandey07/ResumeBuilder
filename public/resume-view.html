<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Preview — ResumeForge</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f0f1f3;min-height:100vh}

.action-bar{background:#ffffff;border-bottom:1px solid #e5e7eb;padding:0 28px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.action-left{display:flex;align-items:center;gap:12px}
.action-left h2{font-size:15px;font-weight:700;color:#111827;display:flex;align-items:center;gap:8px}
.action-left h2 i{width:17px;height:17px;color:#6366f1}
.action-right{display:flex;gap:10px}
.btn{padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:7px;text-decoration:none}
.btn i{width:16px;height:16px}
.btn-ghost{background:#fff;color:#6b7280;border:1px solid #e5e7eb}
.btn-ghost:hover{background:#f9fafb}
.btn-edit{background:#eff6ff;color:#3b82f6;border:1px solid #bfdbfe}
.btn-edit:hover{background:#dbeafe}
.btn-print{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;box-shadow:0 4px 16px rgba(99,102,241,0.2)}
.btn-print:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(99,102,241,0.3)}

.resume-wrapper{max-width:8.5in;margin:28px auto;background:#fff;box-shadow:0 2px 20px rgba(0,0,0,0.08);border-radius:4px;overflow:hidden;border:1px solid #e5e7eb}

/* Resume Styles — exact match to original template */
.resume{font-family:'Calibri','Arial',sans-serif;font-size:10pt;line-height:1.25;color:#000;padding:.35in}
.resume .header{text-align:center;margin-bottom:12px;border-bottom:2px solid #000;padding-bottom:10px}
.resume .name{font-size:22pt;font-weight:bold;letter-spacing:1px;margin-bottom:5px;text-transform:uppercase}
.resume .title{font-size:11pt;font-weight:600;color:#333;margin-bottom:6px}
.resume .contact-info{font-size:9.5pt;line-height:1.4}
.resume .contact-info a{color:#000;text-decoration:none}
.resume .contact-info span{margin:0 5px}
.resume .section{margin-bottom:10px}
.resume .section-title{font-size:11pt;font-weight:bold;text-transform:uppercase;border-bottom:1.5px solid #000;padding-bottom:2px;margin-bottom:6px;letter-spacing:.5px}
.resume .summary{text-align:justify;line-height:1.3}
.resume .experience-item{margin-bottom:10px;page-break-inside:avoid}
.resume .experience-header{display:flex;justify-content:space-between;margin-bottom:4px}
.resume .company-title{font-weight:bold;font-size:10.5pt}
.resume .position{font-style:italic;font-size:9.5pt;margin-top:1px}
.resume .duration{font-size:9.5pt;color:#333;text-align:right}
.resume .location{font-size:9.5pt;color:#333;text-align:right;margin-top:1px}
.resume .responsibilities{margin-left:16px;margin-top:4px}
.resume .responsibilities li{margin-bottom:2px;line-height:1.25}
.resume .skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px}
.resume .skill-category{margin-bottom:4px}
.resume .skill-category strong{font-weight:bold;display:inline-block;min-width:120px}
.resume .project-item{margin-bottom:8px;page-break-inside:avoid}
.resume .project-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.resume .project-title{font-weight:bold;font-size:10pt}
.resume .project-tech{font-size:9pt;color:#333;font-style:italic}
.resume .project-link{font-size:9pt;color:#0066cc;text-decoration:none;margin-left:8px}
.resume .project-link:hover{text-decoration:underline}
.resume .project-description{margin-left:16px}
.resume .project-description li{margin-bottom:2px;line-height:1.25}
.resume .cert-list{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.resume .cert-item{font-size:9.5pt}

.loading-page{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:#9ca3af;gap:14px}
.loading-page i{width:32px;height:32px;color:#6366f1;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media print{
  .action-bar{display:none!important}
  body{background:#fff;margin:0;padding:0}
  .resume-wrapper{margin:0;box-shadow:none;border-radius:0;border:none}
  .resume{padding:.35in}
  .resume .section{page-break-inside:avoid}
  .resume a{color:#000;text-decoration:none}
  .resume .project-link{color:#333}
  @page{size:A4;margin:.35in}
}
</style>
</head>
<body>
<div class="action-bar">
  <div class="action-left">
    <button class="btn btn-ghost" onclick="location.href='/dashboard'"><i data-lucide="arrow-left"></i> Dashboard</button>
    <h2><i data-lucide="eye"></i> Resume Preview</h2>
  </div>
  <div class="action-right">
    <button class="btn btn-edit" id="editBtn"><i data-lucide="pencil"></i> Edit</button>
    <button class="btn btn-print" onclick="window.print()"><i data-lucide="printer"></i> Print / Save PDF</button>
  </div>
</div>
<div id="content"><div class="loading-page"><i data-lucide="loader-2"></i><span>Loading resume...</span></div></div>
<script>
lucide.createIcons();
const resumeId=location.pathname.split('/').pop();
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

async function loadResume(){
  try{
    const r=await fetch('/api/resumes/'+resumeId);const d=await r.json();
    if(!d.resume){document.getElementById('content').innerHTML='<div class="loading-page"><span style="color:#ef4444">Resume not found</span></div>';return}
    document.getElementById('editBtn').onclick=()=>location.href='/resume-form?id='+resumeId;
    renderResume(d.resume.data);
  }catch(e){document.getElementById('content').innerHTML='<div class="loading-page"><span style="color:#ef4444">Failed to load</span></div>'}
}

function renderResume(data){
  const p=data.personalInfo||{};
  let contacts=[];
  if(p.phone)contacts.push(`<a href="tel:${esc(p.phone)}">${esc(p.phone)}</a>`);
  if(p.email)contacts.push(`<a href="mailto:${esc(p.email)}">${esc(p.email)}</a>`);
  if(p.website)contacts.push(`<a href="https://${esc(p.website)}">${esc(p.website)}</a>`);
  if(p.github)contacts.push(`<a href="https://${esc(p.github)}">${esc(p.github)}</a>`);
  if(p.linkedin)contacts.push(`<a href="https://${esc(p.linkedin)}">${esc(p.linkedin)}</a>`);
  if(p.location)contacts.push(esc(p.location));
  const ch=contacts.join(' <span>•</span> ');

  let sk='';
  if(data.skills?.length)sk=`<div class="section"><div class="section-title">Technical Skills</div><div class="skills-grid">${data.skills.map(s=>`<div class="skill-category"><strong>${esc(s.category)}:</strong> ${esc(s.items)}</div>`).join('')}</div></div>`;

  let ex='';
  if(data.experience?.length)ex=`<div class="section"><div class="section-title">Professional Experience</div>${data.experience.map(e=>`<div class="experience-item"><div class="experience-header"><div><div class="company-title">${esc(e.jobTitle)}</div><div class="position">${esc(e.company)}</div></div><div><div class="duration">${esc(e.duration)}</div><div class="location">${esc(e.location)}</div></div></div>${e.responsibilities?.length?`<ul class="responsibilities">${e.responsibilities.map(r=>`<li>${esc(r)}</li>`).join('')}</ul>`:''}</div>`).join('')}</div>`;

  let pj='';
  if(data.projects?.length)pj=`<div class="section"><div class="section-title">Featured Projects</div>${data.projects.map(pr=>`<div class="project-item"><div class="project-header"><div><span class="project-title">${esc(pr.name)}</span>${pr.link?`<a href="${esc(pr.link)}" class="project-link">${esc(pr.link.replace(/^https?:\/\//,''))}</a>`:''}</div><div class="project-tech">${esc(pr.tech)}</div></div>${pr.descriptions?.length?`<ul class="project-description">${pr.descriptions.map(d=>`<li>${esc(d)}</li>`).join('')}</ul>`:''}</div>`).join('')}</div>`;

  let ct='';
  if(data.certifications?.length)ct=`<div class="section"><div class="section-title">Certifications & Training</div><div class="cert-list">${data.certifications.map(c=>`<div class="cert-item">• ${esc(c)}</div>`).join('')}</div></div>`;

  let ad='';
  if(data.additional?.length)ad=`<div class="section"><div class="section-title">Additional Information</div><ul class="responsibilities">${data.additional.map(a=>`<li><strong>${esc(a.label)}:</strong> ${esc(a.text)}</li>`).join('')}</ul></div>`;

  document.getElementById('content').innerHTML=`<div class="resume-wrapper"><div class="resume">
    <div class="header"><div class="name">${esc(p.name)}</div>${p.title?`<div class="title">${esc(p.title)}</div>`:''}<div class="contact-info">${ch}</div></div>
    ${data.summary?`<div class="section"><div class="section-title">Professional Summary</div><div class="summary">${esc(data.summary)}</div></div>`:''}
    ${sk}${ex}${pj}${ct}${ad}</div></div>`;
}
loadResume();
</script>
</body>
</html>
